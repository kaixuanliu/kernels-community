name: Manual Kernel Build
run-name: >-
  Manual Kernel Build / ${{ inputs.kernel_name }} / target=${{ inputs.target_branch }} / request=${{ inputs.dispatch_key }}

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: 'Kernel directory to build and upload (e.g. flash-attn3)'
        required: true
      pr_number:
        description: 'Optional PR number to checkout before building'
        required: false
        default: ''
      target_branch:
        description: 'Target branch on kernels-community/<kernel> to publish to'
        required: true
      upload:
        description: 'Whether to upload after build (internal use by kernel-bot)'
        required: false
        default: 'true'
      allow_main_dispatch:
        description: 'Allow dispatch from default branch without pr_number (internal)'
        required: false
        default: 'false'
      dispatch_key:
        description: 'Unique request token for correlating workflow runs (internal)'
        required: false
        default: 'manual'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on:
      group: aws-highmemory-32-plus-nix
    steps:
      - name: Ensure workflow is not run from main
        if: ${{ github.ref == 'refs/heads/main' && inputs.pr_number == '' && inputs.allow_main_dispatch != 'true' }}
        run: |
          echo "❌ This workflow must be dispatched from a non-main branch."
          exit 1

      - name: Checkout selected branch
        if: ${{ inputs.pr_number == '' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR number
        if: ${{ inputs.pr_number != '' }}
        id: validate-pr-number
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -eu
          case "$PR_NUMBER" in
            ''|*[!0-9]*)
              echo "Invalid pr_number input: must be numeric"
              exit 1
              ;;
          esac
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        if: ${{ inputs.pr_number != '' }}
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ steps.validate-pr-number.outputs.pr_number }}/head
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            max-jobs = 2
            cores = 12
            sandbox-fallback = false

      - name: Nix info
        run: nix-shell -p nix-info --run "nix-info -m"

      - uses: cachix/cachix-action@v16
        with:
          name: huggingface
        env:
          USER: runner

      - name: Validate kernel directory
        id: validate
        env:
          KERNEL_INPUT: ${{ inputs.kernel_name }}
        run: |
          set -eu
          case "$KERNEL_INPUT" in
            ''|*[!A-Za-z0-9_-]*)
              echo "Invalid kernel_name: must contain only alphanumeric characters, underscores, and hyphens"
              exit 1
              ;;
          esac
          if KERNEL=$(python3 .github/workflows/validate-kernel-pr.py "release" "${KERNEL_INPUT}: manual dispatch"); then
            echo "kernel=$KERNEL" >> "$GITHUB_OUTPUT"
          else
            echo "Kernel validation failed."
            exit 1
          fi

      - name: Build and copy kernel
        run: |
          set -eu
          KERNEL="${{ steps.validate.outputs.kernel }}"
          ( cd "$KERNEL" && nix run -L .#build-and-copy )

      - name: Upload kernel
        if: ${{ inputs.upload == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -eu
          KERNEL="${{ steps.validate.outputs.kernel }}"
          ( cd "$KERNEL" && nix run .#kernel-builder -- upload --repo-type model --repo-id "kernels-community/$KERNEL" --branch "$TARGET_BRANCH" . )
          ( cd "$KERNEL" && nix run .#kernel-builder -- upload --repo-type kernel --repo-id "kernels-community/$KERNEL" --branch "$TARGET_BRANCH" . )
